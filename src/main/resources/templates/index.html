<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="lang=${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{system.title}">DEEP AMAMI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        /* 1行追加するだけで、サイト全体がヌルッと心地よくスクロールします */
        html {
            scroll-behavior: smooth;
        }
        /* 現在のサイトの美しいトーンを崩さないための補正スタリング */
        body {
            font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
            background-color: #f8f9fa;
        }
        .card-custom {
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        /* スムーズスクロール時のヘッダー被り防止のための余白設定 */
        section {
            scroll-margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- ヘッダー・ナビゲーションエリア（トップとタイムラインに最適化） -->
    <header class="bg-dark text-white py-3 shadow-sm sticky-top">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div>
                <h1 class="display-6 fw-bold m-0" th:text="#{system.title}">DEEP AMAMI</h1>
                <p class="lead text-muted small m-0" th:text="#{system.subtitle}">Sharing Amami's deep stories...</p>
            </div>
            
            <!-- ナビゲーションリンク（記事・データは完全に削除） -->
            <nav class="my-2 my-md-0">
                <a href="#welcome-section" class="text-white text-decoration-none me-3" th:text="#{nav.top}">トップ</a>
                <a href="#timeline-section" class="text-white text-decoration-none me-3" th:text="#{nav.timeline}">タイムライン</a>
                
                <!-- 言語切り替えの動的リンク -->
                <span class="border-start border-secondary ps-3ms-2">
                    <a href="?lang=ja" class="btn btn-sm btn-outline-light py-0 px-2">JP</a>
                    <a href="?lang=en" class="btn btn-sm btn-outline-light py-0 px-2">EN</a>
                </span>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <!-- セクション1：トップ（ウェルカムエリア） -->
        <section id="welcome-section" class="mb-5">
            <div class="p-5 mb-4 bg-light rounded-3 shadow-sm text-center">
                <div class="container-fluid py-5">
                    <h2 class="display-5 fw-bold" th:text="#{intro.title}">奄美へようこそ</h2>
                    <p class="col-md-8 mx-auto fs-4 text-muted" th:text="#{intro.description}">
                        生活者の目線から、奄美の魅力と最新の情報をお届けします。
                    </p>
                    <a href="#timeline-section" class="btn btn-primary btn-lg" th:text="#{btn.explore}">タイムラインを見る</a>
                </div>
            </div>
        </section>

        <!-- セクション2：島民タイムライン（実装済みのコア機能） -->
        <section id="timeline-section" class="card-custom bg-white p-4 rounded-3 shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h3 class="m-0 fw-bold text-secondary" th:text="#{nav.timeline}">島民のタイムライン</h3>
            </div>
            
            <!-- ※ここに、すでに綺麗に動いているタイムラインの投稿フォームや、
                 th:each を使った投稿リスト（島民A、B、Cさんなどのデータ表示）のコードをそのまま配置してください -->

        </section>
    </main>

    <footer class="text-center text-muted py-4 bg-light border-top mt-5">
        <p class="small mb-0">&copy; 2026 DEEP AMAMI Project. All Rights Reserved.</p>
    </footer>

</body>
</html>
